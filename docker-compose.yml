version: '3.8'

services:
  # ── Redis (단기 메모리 - L2 업그레이드 시 사용) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: myclone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ── ChromaDB (벡터 DB - L2 업그레이드 시 사용) ─────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: myclone-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # ── PostgreSQL (프로젝트 메타데이터 - 선택적) ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: myclone-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pka
      POSTGRES_PASSWORD: pka1234
      POSTGRES_DB: pka_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  chroma_data:
  pg_data:
