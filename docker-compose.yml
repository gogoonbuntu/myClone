version: '3.9'

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: pka-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER=X-Chroma-Token
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_AUTH_TOKEN:-pka-secret-token}
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pka-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-pka-redis-pass}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: pka-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pka_db}
      POSTGRES_USER: ${POSTGRES_USER:-pka_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pka-pg-pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  chroma_data:
  redis_data:
  postgres_data:

networks:
  default:
    name: pka-network
